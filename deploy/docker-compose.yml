# 「AI物聯網實驗室」production deployment: the app container (nginx SPA +
# FastAPI + arduino-cli + QEMU) behind Caddy for automatic HTTPS.
#
#   cd deploy
#   cp .env.example .env   # fill it in
#   docker compose up -d --build
#
# See ../DEPLOY_HANDOFF.md for the full runbook.

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile.standalone
      args:
        # Only needed when prebuilt/qemu/ has no .so files — a free personal
        # key from https://velxio.dev/license/signup unlocks the QEMU blobs.
        VELXIO_LICENSE_KEY: ${VELXIO_LICENSE_KEY:-}
    container_name: ailab-app
    restart: unless-stopped
    env_file: .env
    expose:
      - "80"
    networks:
      - default
      - caddy_net
    volumes:
      - app-data:/app/data # SQLite DB + secret key — BACK THIS UP
      - arduino15:/root/.arduino15 # arduino-cli cores/toolchains
      - arduino-libs:/root/Arduino # installed Arduino libraries
      - ccache:/var/cache/ccache # compile cache (fast rebuilds)
      - build-cache:/var/lib/velxio-build

# NOTE: this host already runs a shared Caddy (compose project at
# /opt/1panel/docker/compose/caddy) bound to 80/443 with per-site files in
# sites.d/. The bundled caddy service is therefore not used here — the app
# joins the external caddy_net network and sites.d/iot.armjp.yueseng-ys.com.caddy
# reverse-proxies to ailab-app:80.

networks:
  caddy_net:
    external: true

volumes:
  app-data:
  arduino15:
  arduino-libs:
  ccache:
  build-cache:
